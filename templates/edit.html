<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Редактирование продукта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="card-title mb-4 fw-bold text-dark">
                            <i class="fas fa-edit text-primary me-2"></i>Редактирование
                        </h4>
                        <form method="POST" action="{{ url_for('edit_product', product_id=product.id) }}">
                            <div class="mb-3">
                                <label for="name" class="form-label text-muted small fw-semibold">Название продукта *</label>
                                <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required />
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label for="quantity" class="form-label text-muted small fw-semibold">Количество</label>
                                    <input type="number" step="0.01" class="form-control" id="quantity" name="quantity" value="{{ product.quantity }}" required />
                                </div>
                                <div class="col-md-6">
                                    <label for="unit" class="form-label text-muted small fw-semibold">Единица измерения</label>
                                    <select class="form-select" id="unit" name="unit">
                                        <option value="шт" {% if product.unit == 'шт' %}selected{% endif %}>шт</option>
                                        <option value="кг" {% if product.unit == 'кг' %}selected{% endif %}>кг</option>
                                        <option value="г" {% if product.unit == 'г' %}selected{% endif %}>г</option>
                                        <option value="л" {% if product.unit == 'л' %}selected{% endif %}>л</option>
                                        <option value="мл" {% if product.unit == 'мл' %}selected{% endif %}>мл</option>
                                        <option value="уп" {% if product.unit == 'уп' %}selected{% endif %}>уп</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label for="category" class="form-label text-muted small fw-semibold">Категория</label>
                                    <input type="text" class="form-control" id="category" name="category" value="{{ product.category or '' }}" placeholder="Напр. Овощи" />
                                </div>
                                <div class="col-md-6">
                                    <label for="manufacture_date" class="form-label text-muted small fw-semibold">Дата изготовления</label>
                                    <input type="date" class="form-control" id="manufacture_date" name="manufacture_date" value="{{ product.manufacture_date.strftime('%Y-%m-%d') if product.manufacture_date else '' }}" />
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted small fw-semibold d-block">Расчёт срока годности:</label>
                                <div class="btn-group w-100" role="group">
                                    <input type="radio" class="btn-check" name="expiration_type" id="edit_exp_date" value="date" checked />
                                    <label class="btn btn-outline-primary py-2" for="edit_exp_date">По точной дате</label>
                                    <input type="radio" class="btn-check" name="expiration_type" id="edit_exp_manufacture" value="from_manufacture" />
                                    <label class="btn btn-outline-primary py-2" for="edit_exp_manufacture">По дням хранения</label>
                                </div>
                            </div>

                            <div class="mb-4" id="expiration_date_group_edit">
                                <label for="expiration_date" class="form-label text-muted small fw-semibold">Конечная дата годности</label>
                                <input type="date" class="form-control" id="expiration_date" name="expiration_date" value="{{ product.expiration_date.strftime('%Y-%m-%d') if product.expiration_date else '' }}" />
                            </div>

                            <div class="mb-4" id="expiration_days_group_edit" style="display:none;">
                                <label for="expiration_days" class="form-label text-muted small fw-semibold">Количество дней хранения</label>
                                <input type="number" class="form-control" id="expiration_days" name="expiration_days" min="1" value="7" />
                            </div>

                            <div class="d-flex justify-content-between align-items-center mt-4">
                                <a href="{{ url_for('index') }}" class="text-secondary text-decoration-none small">
                                    <i class="fas fa-arrow-left me-1"></i> Вернуться назад
                                </a>
                                <button type="submit" class="btn btn-primary px-4 py-2">
                                    <i class="fas fa-save me-1"></i> Сохранить изменения
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dateGroup = document.getElementById('expiration_date_group_edit');
            const daysGroup = document.getElementById('expiration_days_group_edit');
            const radios = document.querySelectorAll('input[name="expiration_type"]');

            function toggleGroups() {
                const checked = document.querySelector('input[name="expiration_type"]:checked');
                if (checked.value === 'date') {
                    dateGroup.style.display = 'block';
                    daysGroup.style.display = 'none';
                } else {
                    dateGroup.style.display = 'none';
                    daysGroup.style.display = 'block';
                }
            }

            radios.forEach(radio => radio.addEventListener('change', toggleGroups));
            toggleGroups();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
