<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Редактирование продукта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-edit me-2"></i>Редактирование продукта
                    </div>
                    <div class="card-body">
                        <form method="POST" action="{{ url_for('edit_product', product_id=product.id) }}">
                            <div class="mb-3">
                                <label for="name" class="form-label">Название *</label>
                                <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required />
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label for="quantity" class="form-label">Количество</label>
                                    <input type="number" step="0.01" class="form-control" id="quantity" name="quantity" value="{{ product.quantity }}" />
                                </div>
                                <div class="col-md-6">
                                    <label for="unit" class="form-label">Единица измерения</label>
                                    <select class="form-select" id="unit" name="unit">
                                        <option value="шт" {% if product.unit == 'шт' %}selected{% endif %}>шт</option>
                                        <option value="кг" {% if product.unit == 'кг' %}selected{% endif %}>кг</option>
                                        <option value="г" {% if product.unit == 'г' %}selected{% endif %}>г</option>
                                        <option value="л" {% if product.unit == 'л' %}selected{% endif %}>л</option>
                                        <option value="мл" {% if product.unit == 'мл' %}selected{% endif %}>мл</option>
                                        <option value="уп" {% if product.unit == 'уп' %}selected{% endif %}>уп</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="category" class="form-label">Категория</label>
                                <input type="text" class="form-control" id="category" name="category" value="{{ product.category or '' }}" />
                            </div>

                            <div class="mb-3">
                                <label for="manufacture_date" class="form-label">Дата изготовления</label>
                                <input type="date" class="form-control" id="manufacture_date" name="manufacture_date"
                                       value="{% if product.manufacture_date %}{{ product.manufacture_date.strftime('%Y-%m-%d') }}{% endif %}" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Способ указания срока</label>
                                <div class="btn-group w-100" role="group">
                                    <input type="radio" class="btn-check" name="expiration_type" id="exp_date_edit" value="date"
                                           {% if product.expiration_date and not product.manufacture_date %}checked{% endif %} />
                                    <label class="btn btn-outline-primary" for="exp_date_edit">Дата</label>
                                    <input type="radio" class="btn-check" name="expiration_type" id="exp_manufacture_edit" value="from_manufacture"
                                           {% if product.expiration_date and product.manufacture_date %}checked{% endif %} />
                                    <label class="btn btn-outline-primary" for="exp_manufacture_edit">От изготовления</label>
                                </div>
                            </div>

                            <div class="mb-3" id="expiration_date_group_edit">
                                <label for="expiration_date" class="form-label">Дата годности</label>
                                <input type="date" class="form-control" id="expiration_date" name="expiration_date"
                                       value="{% if product.expiration_date %}{{ product.expiration_date.strftime('%Y-%m-%d') }}{% endif %}" />
                            </div>

                            <div class="mb-3" id="expiration_days_group_edit" style="{% if product.expiration_date and not product.manufacture_date %}display:none;{% endif %}">
                                <label for="expiration_days" class="form-label">Дней хранения</label>
                                <input type="number" class="form-control" id="expiration_days" name="expiration_days" min="1" value="7" />
                            </div>

                            {% with messages = get_flashed_messages(with_categories=true) %}
                                {% if messages %}
                                    {% for category, message in messages %}
                                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                            {{ message }}
                                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                        </div>
                                    {% endfor %}
                                {% endif %}
                            {% endwith %}

                            <div class="d-flex justify-content-between mt-4">
                                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                                    <i class="fas fa-arrow-left me-1"></i> Назад
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i> Сохранить
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dateGroup = document.getElementById('expiration_date_group_edit');
            const daysGroup = document.getElementById('expiration_days_group_edit');
            const radios = document.querySelectorAll('input[name="expiration_type"]');

            function toggleGroups() {
                const checked = document.querySelector('input[name="expiration_type"]:checked');
                if (checked.value === 'date') {
                    dateGroup.style.display = 'block';
                    daysGroup.style.display = 'none';
                } else {
                    dateGroup.style.display = 'none';
                    daysGroup.style.display = 'block';
                }
            }

            radios.forEach(radio => radio.addEventListener('change', toggleGroups));
            toggleGroups();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
