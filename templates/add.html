<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Добавление продукта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <div class="container px-2 px-sm-3 py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-3 p-sm-4">
                        <div class="d-flex align-items-center justify-content-between mb-4">
                            <h4 class="fw-bold text-dark mb-0 h5-mobile">
                                <i class="fas fa-plus-circle text-primary me-2"></i>Новый продукт
                            </h4>
                            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm px-2.5 py-1.5">
                                <i class="fas fa-arrow-left me-1"></i> К списку
                            </a>
                        </div>
                        
                        <form method="POST" action="{{ url_for('add_product_page') }}" autocomplete="off">
                            <div class="row g-3 mb-3">
                                <div class="col-md-6 position-relative">
                                    <label for="name" class="form-label text-muted small fw-semibold">Название продукта *</label>
                                    <input type="text" class="form-control form-control-lg-mobile" id="name" name="name" placeholder="Начните вводить..." required />
                                    <div id="search-results-dropdown" class="list-group position-absolute w-100 shadow-sm d-none" style="z-index: 1000; max-height: 220px; overflow-y: auto; background: white;"></div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <label for="quantity" class="form-label text-muted small fw-semibold">Количество</label>
                                    <input type="number" step="0.01" class="form-control form-control-lg-mobile" id="quantity" name="quantity" value="1.0" />
                                </div>
                                <div class="col-6 col-md-3">
                                    <label for="unit" class="form-label text-muted small fw-semibold">Единица</label>
                                    <select class="form-select form-select-lg-mobile" id="unit" name="unit">
                                        <option value="шт">шт</option>
                                        <option value="кг">кг</option>
                                        <option value="г">г</option>
                                        <option value="л">л</option>
                                        <option value="мл">мл</option>
                                        <option value="уп">уп</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label for="category" class="form-label text-muted small fw-semibold">Категория</label>
                                    <input type="text" class="form-control form-control-lg-mobile" id="category" name="category" placeholder="Напр. Овощи" />
                                </div>
                                <div class="col-md-6">
                                    <label for="manufacture_date" class="form-label text-muted small fw-semibold">Дата изготовления</label>
                                    <input type="date" class="form-control form-control-lg-mobile" id="manufacture_date" name="manufacture_date" />
                                </div>
                            </div>

                            <div class="p-3 bg-light rounded border mb-4">
                                <h6 class="fw-bold text-secondary mb-3" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">Пищевая ценность (на 100г)</h6>
                                <div class="row row-cols-2 row-cols-md-4 g-2">
                                    <div>
                                        <label for="calories" class="form-label text-muted table-label-sub">Калории (ккал)</label>
                                        <input type="number" class="form-control" id="calories" name="calories" value="0" />
                                    </div>
                                    <div>
                                        <label for="proteins" class="form-label text-muted table-label-sub">Белки (г)</label>
                                        <input type="number" step="0.1" class="form-control" id="proteins" name="proteins" value="0.0" />
                                    </div>
                                    <div>
                                        <label for="fats" class="form-label text-muted table-label-sub">Жиры (г)</label>
                                        <input type="number" step="0.1" class="form-control" id="fats" name="fats" value="0.0" />
                                    </div>
                                    <div>
                                        <label for="carbs" class="form-label text-muted table-label-sub">Углеводы (г)</label>
                                        <input type="number" step="0.1" class="form-control" id="carbs" name="carbs" value="0.0" />
                                    </div>
                                </div>
                            </div>

                            <div class="row g-3 align-items-end mb-4">
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-semibold">Контроль срока годности:</label>
                                    <div class="btn-group w-100" role="group">
                                        <input type="radio" class="btn-check" name="expiration_type" id="exp_date" value="date" checked />
                                        <label class="btn btn-outline-primary py-2.5" for="exp_date">По дате</label>
                                        <input type="radio" class="btn-check" name="expiration_type" id="exp_manufacture" value="from_manufacture" />
                                        <label class="btn btn-outline-primary py-2.5" for="exp_manufacture">По дням</label>
                                    </div>
                                </div>
                                <div class="col-md-6" id="expiration_date_group">
                                    <label for="expiration_date" class="form-label text-muted small fw-semibold">Конечная дата годности</label>
                                    <input type="date" class="form-control form-control-lg-mobile" id="expiration_date" name="expiration_date" />
                                </div>
                                <div class="col-md-6" id="expiration_days_group" style="display:none;">
                                    <label for="expiration_days" class="form-label text-muted small fw-semibold">Сколько дней хранится</label>
                                    <input type="number" class="form-control form-control-lg-mobile" id="expiration_days" name="expiration_days" min="1" value="7" />
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-3 fw-medium btn-lg-mobile">
                                <i class="fas fa-plus-circle me-1"></i> Добавить в холодильник
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dateGroup = document.getElementById('expiration_date_group');
            const daysGroup = document.getElementById('expiration_days_group');
            const radios = document.querySelectorAll('input[name="expiration_type"]');

            function toggleGroups() {
                const checked = document.querySelector('input[name="expiration_type"]:checked');
                if (checked.value === 'date') {
                    dateGroup.style.display = 'block';
                    daysGroup.style.display = 'none';
                } else {
                    dateGroup.style.display = 'none';
                    daysGroup.style.display = 'block';
                }
            }
            radios.forEach(radio => radio.addEventListener('change', toggleGroups));

            const nameInput = document.getElementById('name');
            const categoryInput = document.getElementById('category');
            const dropdown = document.getElementById('search-results-dropdown');
            
            const calInp = document.getElementById('calories');
            const protInp = document.getElementById('proteins');
            const fatInp = document.getElementById('fats');
            const carbInp = document.getElementById('carbs');
            
            let timeout = null;

            nameInput.addEventListener('input', function() {
                clearTimeout(timeout);
                const query = nameInput.value.trim();
                if (query.length < 2) {
                    dropdown.classList.add('d-none');
                    return;
                }

                timeout = setTimeout(() => {
                    fetch(`/api/search-food?q=${encodeURIComponent(query)}`)
                        .then(res => res.json())
                        .then(data => {
                            dropdown.innerHTML = '';
                            if (data.length > 0) {
                                data.forEach(item => {
                                    const btn = document.createElement('button');
                                    btn.type = 'button';
                                    btn.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center text-start border-0 py-2.5 px-3';
                                    btn.innerHTML = `
                                        <div style="max-width: 75%;">
                                            <div class="text-dark fw-medium text-truncate">${item.name}</div>
                                            <small class="text-muted font-monospace d-block text-truncate">КБЖУ: ${item.calories}/${item.proteins}/${item.fats}/${item.carbs}</small>
                                        </div>
                                        <span class="badge bg-light text-muted border text-truncate" style="max-width: 25%;">${item.category}</span>
                                    `;
                                    
                                    btn.addEventListener('click', () => {
                                        nameInput.value = item.name;
                                        categoryInput.value = item.category;
                                        calInp.value = item.calories;
                                        protInp.value = item.proteins;
                                        fatInp.value = item.fats;
                                        carbInp.value = item.carbs;
                                        dropdown.classList.add('d-none');
                                    });
                                    dropdown.appendChild(btn);
                                });
                                dropdown.classList.remove('d-none');
                            } else {
                                dropdown.classList.add('d-none');
                            }
                        });
                }, 150);
            });

            nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') e.preventDefault(); });
            document.addEventListener('click', e => { if (!nameInput.contains(e.target)) dropdown.classList.add('d-none'); });
        });
    </script>
</body>
</html>
